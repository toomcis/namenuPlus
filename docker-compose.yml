services:
  namenuPlus:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/toomcis/namenuplus:latest
    restart: unless-stopped
    container_name: namenuPlus-API
    environment:
      - PORT=2332
      - MAIN_DB=/app/data/main.db
      - NAMENU_DB=/app/data/namenu.db
    ports:
      - "2332:2332"
    volumes:
      - namenu_data:/app/data   # persists both main.db and namenu.db
    tty: true
    stdin_open: true

volumes:
  namenu_data: